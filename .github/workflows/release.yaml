name: Release
'on':
  workflow_dispatch:
    inputs:
      libc:
        description: 'Libc type to build'
        required: true
        type: choice
        options: [musl, gnu]
        default: musl
      freespace:
        description: Free Up Disk Space
        required: true
        type: boolean
        default: false
      swapspace:
        description: Add Swap
        required: true
        type: boolean
        default: false
      swapsize:
        description: Swap Size (in gb)
        type: choice
        required: false
        options: [3, 5, 10]
        default: 5
      sshserver:
        description: Run SSH Server before build
        required: true
        type: boolean
        default: false
      make_release:
        description: GitHub Release?
        type: boolean
        default: false
      release_name:
        description: Release name?
        type: string
        default: ''
concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.libc }}'
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build-llvm:
    name: Build LLVM
    runs-on: ubuntu-24.04
    steps:
      - if: '${{ inputs.freespace }}'
        name: Free Up Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          swap-storage: false
          large-packages: true
          tool-cache: true
          android: true
          dotnet: true
          haskell: false
          docker-images: true
      - if: '${{ inputs.swapspace }}'
        name: Add Swap Space for Build
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: '${{ inputs.swapsize }}'
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true
      - name: Get LLVM hash
        id: llvm-hash
        run: 'echo "hash=$(git rev-parse HEAD:llvm)" >> $GITHUB_OUTPUT'
      - name: Restore LLVM build cache
        id: cache-llvm
        uses: actions/cache@v5
        with:
          path: clang-cross.tar.xz
          key: 'clang-cross-${{ steps.llvm-hash.outputs.hash }}'
      - name: CCACHE Env Variables
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt-get -y update

          DEBIAN_FRONTEND=noninteractive sudo apt-get -y install apt-utils ccache ca-certificates gpg wget zstd

          cat >> $GITHUB_ENV << 'EOF'
          CCACHE_SLOPPINESS=locale,time_macros,random_seed,file_macro,include_file_mtime,include_file_ctime,file_stat_matches,pch_defines,clang_index_store,include_file_ctime,ivfsoverlay,modules,system_headers
          CCACHE_NOHASHDIR=true
          CCACHE_COMPRESS=true
          CCACHE_COMPRESSLEVEL=18
          CCACHE_NOFILECLONE=true
          CCACHE_NOHARDLINK=true
          CCACHE_INODECACHE=true
          CCACHE_NLEVELS=4
          CCACHE_COMPILERCHECK=content
          CCACHE_DIRECT=true
          EOF

          # Setup CCACHE Dir
          sudo mkdir -p /mnt/ccache
          sudo chown -R $USER:$USER /mnt/ccache
          echo "CCACHE_DIR=/mnt/ccache" >> $GITHUB_ENV
          echo "CCACHE Dir Set!"
          # Setup tarballs dir for download caching
          sudo mkdir -p /mnt/tarballs
          sudo chown -R $USER:$USER /mnt/tarballs
          df -h
          echo "CCACHE Environment set!"
      - name: Enable the CCACHE
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          create-symlink: 'true'
          key: 'ccache-${{ runner.os }}-llvm-${{ steps.llvm-hash.outputs.hash }}'
          restore-keys: |
            ccache-${{ runner.os }}-llvm-
          max-size: 5000MB
          verbose: 2
          save: true
      - name: Enable Kitware Repository
        run: |
          test -f /usr/share/doc/kitware-archive-keyring/copyright || wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null
      - if: '${{ inputs.sshserver }}'
        name: SSH Server-ing
        uses: valeriangalliat/action-sshd-cloudflared@v4
      - name: Build LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          sudo rm -rf /opt/clang-cross
          umask 0022
          chmod +x ./scripts/make
          bash ./scripts/make llvm
      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: clang-cross.tar.xz
          path: clang-cross.tar.xz
          if-no-files-found: error
          retention-days: 1
  build-gnu-targets:
    name: Build GNU Targets
    runs-on: ubuntu-24.04
    needs: build-llvm
    if: inputs.libc == 'gnu'
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64_be-unknown-linux-gnu
          - alphaev56-unknown-linux-gnu
          - alphaev67-unknown-linux-gnu
          - arm-unknown-linux-gnueabi
          - arm-unknown-linux-gnueabihf
          - armv4t-unknown-linux-gnueabi
          - armv5-unknown-linux-gnueabi
          - armv6-unknown-linux-gnueabi
          - armv6-unknown-linux-gnueabihf
          - armv7-unknown-linux-gnueabi
          - armv7-unknown-linux-gnueabihf
          - hppa-unknown-linux-gnu
          - i486-unknown-linux-gnu
          - i586-unknown-linux-gnu
          - i686-unknown-linux-gnu
          - loongarch64-unknown-linux-gnu
          - m68k-unknown-linux-gnu
          - microblaze-xilinx-linux-gnu
          - microblazeel-xilinx-linux-gnu
          - mips-unknown-linux-gnu
          - mips-unknown-linux-gnusf
          - mips64-unknown-linux-gnu
          - mips64el-unknown-linux-gnu
          - mipsel-unknown-linux-gnu
          - mipsel-unknown-linux-gnusf
          - or1k-unknown-linux-gnu
          - powerpc-unknown-linux-gnu
          - powerpc-unknown-linux-gnusf
          - powerpc64-unknown-linux-gnu
          - powerpc64le-unknown-linux-gnu
          - powerpcle-unknown-linux-gnu
          - powerpcle-unknown-linux-gnusf
          - riscv32-unknown-linux-gnu
          - riscv64-unknown-linux-gnu
          - s390x-ibm-linux-gnu
          - sh4-multilib-linux-gnu
          - sparc-unknown-linux-gnu
          - sparc64-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true
      - name: Get LLVM hash
        id: llvm-hash
        run: 'echo "hash=$(git rev-parse HEAD:llvm)" >> $GITHUB_OUTPUT'
      - name: Download
        uses: actions/download-artifact@v8
        with:
          name: clang-cross.tar.xz
      - name: Cache gnu-cross tarball
        uses: actions/cache@v5
        id: cache-target
        with:
          path: |
            ${{ matrix.target }}.tar.xz
            ${{ matrix.target }}.tar.xz.sha256
          key: 'target-${{ matrix.target }}-${{ steps.llvm-hash.outputs.hash }}'
      - name: Build el Target
        if: steps.cache-target.outputs.cache-hit != 'true'
        run: |
          sudo rm -rf /opt/clang-cross
          chmod +x ./scripts/make
          bash ./scripts/make ${{ matrix.target }}
      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: '${{ matrix.target }}.tar.xz'
          path: '${{ matrix.target }}.tar.xz'
          if-no-files-found: error
          retention-days: 1
      - name: Upload checksum
        uses: actions/upload-artifact@v7
        with:
          name: '${{ matrix.target }}.tar.xz.sha256'
          path: '${{ matrix.target }}.tar.xz.sha256'
          if-no-files-found: error
          retention-days: 1
  build-musl-targets:
    name: Build MUSL Targets
    runs-on: ubuntu-24.04
    needs: build-llvm
    if: inputs.libc == 'musl'
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-musl
          - aarch64_be-unknown-linux-musl
          - arm-unknown-linux-musleabi
          - arm-unknown-linux-musleabihf
          - armv5-unknown-linux-musleabi
          - armv6-unknown-linux-musleabi
          - armv6-unknown-linux-musleabihf
          - armv7-unknown-linux-musleabi
          - armv7-unknown-linux-musleabihf
          - i386-unknown-linux-musl
          - i486-unknown-linux-musl
          - i586-unknown-linux-musl
          - i686-unknown-linux-musl
          - loongarch64-unknown-linux-musl
          - m68k-unknown-linux-musl
          - microblaze-xilinx-linux-musl
          - microblazeel-xilinx-linux-musl
          - mips-unknown-linux-musl
          - mips-unknown-linux-muslsf
          - mips64-unknown-linux-musl
          - mips64el-unknown-linux-musl
          - mipsel-unknown-linux-musl
          - mipsel-unknown-linux-muslsf
          - or1k-unknown-linux-musl
          - powerpc-unknown-linux-musl
          - powerpc-unknown-linux-muslsf
          - powerpc64-unknown-linux-musl
          - powerpc64le-unknown-linux-musl
          - powerpcle-unknown-linux-musl
          - powerpcle-unknown-linux-muslsf
          - riscv32-unknown-linux-musl
          - riscv64-unknown-linux-musl
          - s390x-ibm-linux-musl
          - sh4-multilib-linux-musl
          - x86_64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true
      - name: Get LLVM hash
        id: llvm-hash
        run: 'echo "hash=$(git rev-parse HEAD:llvm)" >> $GITHUB_OUTPUT'
      - name: Download
        uses: actions/download-artifact@v8
        with:
          name: clang-cross.tar.xz
      - name: Cache musl-cross tarball
        uses: actions/cache@v5
        id: cache-target
        with:
          path: |
            ${{ matrix.target }}.tar.xz
            ${{ matrix.target }}.tar.xz.sha256
          key: 'target-${{ matrix.target }}-${{ steps.llvm-hash.outputs.hash }}'
      - name: Build el Target
        if: steps.cache-target.outputs.cache-hit != 'true'
        run: |
          sudo rm -rf /opt/clang-cross
          chmod +x ./scripts/make
          bash ./scripts/make ${{ matrix.target }}
      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: '${{ matrix.target }}.tar.xz'
          path: '${{ matrix.target }}.tar.xz'
          if-no-files-found: error
          retention-days: 1
      - name: Upload checksum
        uses: actions/upload-artifact@v7
        with:
          name: '${{ matrix.target }}.tar.xz.sha256'
          path: '${{ matrix.target }}.tar.xz.sha256'
          if-no-files-found: error
          retention-days: 1
  release:
    name: Release
    runs-on: ubuntu-slim
    needs:
      - build-gnu-targets
      - build-musl-targets
    if: |
      !cancelled() && inputs.make_release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          pattern: '*-*-*.tar.*'
          merge-multiple: true
      - name: Generate checksums
        run: |
          echo "| Filename | Sha256sum |" > RELEASE.md
          echo "| -------- | --------- |" >> RELEASE.md
          for i in release/*.sha256; do
            echo "| $(basename $i .sha256) | $(cat $i) |" >> RELEASE.md
          done
      - if: '${{ inputs.release_name != '''' && inputs.make_release }}'
        name: Create Release
        uses: xiechangan123/action-gh-release@master
        with:
          name: '${{ inputs.release_name }}'
          tag_name: '${{ inputs.release_name }}'
          prerelease: false
          draft: false
          generate_release_notes: false
          make_latest: true
          files: release/*-*-*.tar.*
          body_path: RELEASE.md
      - if: '${{ inputs.release_name != '''' && inputs.make_release }}'
        name: Finalize Release
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          # The action-gh-release step above handles most files,
          # but this ensures the body/notes are updated correctly.
          gh release edit "${{ inputs.release_name }}" --notes-file RELEASE.md
