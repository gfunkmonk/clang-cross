name: Release

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  build-llvm:
    name: Build LLVM
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true
      - name: Get LLVM hash
        id: llvm-hash
        run: echo "hash=$(git rev-parse HEAD:llvm)" >> $GITHUB_OUTPUT
      - name: Restore LLVM build cache
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: clang-cross.tar.xz
          key: clang-cross-${{ steps.llvm-hash.outputs.hash }}
      - name: 🅲🅲🅰🅲🅷🅴 🅴🅽🆅🅸🆁🅾🅽🅼🅴🅽🆃 🆅🅰🆁🅸🅰🅱🅻🅴🆂
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt-get -y update
          DEBIAN_FRONTEND=noninteractive sudo apt-get -y install apt-utils
          DEBIAN_FRONTEND=noninteractive sudo apt-get -y install ccache
          cat >> $GITHUB_ENV << 'EOF'
          CCACHE_SLOPPINESS=file_macro,locale,time_macros
          CCACHE_NOHASHDIR=true
          CCACHE_COMPRESS=true
          CCACHE_COMPRESSLEVEL=6
          CCACHE_NLEVELS=4
          CCACHE_COMPILERCHECK=content
          CCACHE_DEPEND=true
          EOF
          echo "CCACHE Environment set!"

      - name: 🏎 🅴🅽🅰🅱🅻🅴 🅲🅲🅰🅲🅷🅴 🏁
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          create-symlink: 'true'
          key: ccache-${{ runner.os }}-llvm-${{ steps.llvm-hash.outputs.hash }}
          restore-keys: |
            ccache-${{ runner.os }}-llvm-
          max-size: '5000MB'
          verbose: 2
          save: true

      - name: Build
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          sudo rm -rf /opt/clang-cross
          umask 0022
          ./scripts/make llvm

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: clang-cross.tar.xz
          path: clang-cross.tar.xz
          if-no-files-found: error
          retention-days: 1

  build-targets:
    name: Build Targets
    runs-on: ubuntu-22.04
    needs:
      - build-llvm
    strategy:
      fail-fast: true
      matrix:
        target:
          - aarch64-unknown-linux-musl
          - arm-unknown-linux-musleabi
          - arm-unknown-linux-musleabihf
          - armv5-unknown-linux-musleabi
          - armv6-unknown-linux-musleabi
          - armv6-unknown-linux-musleabihf
          - armv7-unknown-linux-musleabi
          - armv7-unknown-linux-musleabihf
          - i386-unknown-linux-musl
          - i486-unknown-linux-musl
          - i586-unknown-linux-musl
          - i686-unknown-linux-musl
          - loongarch64-unknown-linux-musl
          - mips64el-unknown-linux-musl
          - mips64-unknown-linux-musl
          - mipsel-unknown-linux-musl
          - mipsel-unknown-linux-muslsf
          - mips-unknown-linux-musl
          - mips-unknown-linux-muslsf
          - m68k-unknown-linux-musl
          - or1k-unknown-linux-musl
          - powerpc64le-unknown-linux-musl
          - powerpc64-unknown-linux-musl
          - powerpcle-unknown-linux-musl
          - powerpcle-unknown-linux-muslsf
          - powerpc-unknown-linux-musl
          - powerpc-unknown-linux-muslsf
          - riscv32-unknown-linux-musl
          - riscv64-unknown-linux-musl
          - s390x-ibm-linux-musl
          - sh4-multilib-linux-musl
          - x86_64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Get LLVM hash
        id: llvm-hash
        run: echo "hash=$(git rev-parse HEAD:llvm)" >> $GITHUB_OUTPUT

      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: clang-cross.tar.xz

      - name: Cache target tarball
        id: cache-target
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.target }}.tar.xz
            ${{ matrix.target }}.tar.xz.sha256
          key: target-${{ matrix.target }}-${{ steps.llvm-hash.outputs.hash }}

      - name: Build
        if: steps.cache-target.outputs.cache-hit != 'true'
        run: |
          sudo rm -rf /opt/clang-cross
          ./scripts/make ${{ matrix.target }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}.tar.xz
          path: ${{ matrix.target }}.tar.xz
          if-no-files-found: error
          retention-days: 1

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}.tar.xz.sha256
          path: ${{ matrix.target }}.tar.xz.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-22.04
    needs:
      - build-targets
    if: github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: "*-*-*.tar.*"
          merge-multiple: true

      - name: Generate checksums
        run: |
          echo "| Filename | Sha256sum |" > RELEASE.md
          echo "| -------- | --------- |" >> RELEASE.md
          for i in release/*.sha256; do
            echo "| $(basename $i .sha256) | $(cat $i) |" >> RELEASE.md
          done

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in release/*.tar.xz; do
            gh release upload ${{ github.event.release.tag_name }} $i $i.sha256
          done
          gh release edit ${{ github.event.release.tag_name }} -F RELEASE.md